<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Designer Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<header class="navbar">
  <h1 class="logo">MyPortfolio</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#projects">Projects</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- Hero -->
<section id="home" class="hero fade-in">
  <div>
    <h2>Hi, I'm <span>BEN</span></h2>
    <p>Creative Designer | UI/UX | Branding</p>
    <a href="#projects" class="btn">View My Work</a>
  </div>
</section>

<!-- Projects -->
<section id="projects" class="section fade-in">
  <h2>My Projects</h2>
  <div class="grid">

    <div class="card">
      <img src="https://picsum.photos/400/300?1">
      <div class="card-info">
        <h3>Project One</h3>
        <p>UI Design</p>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/300?2">
      <div class="card-info">
        <h3>Project Two</h3>
        <p>Branding</p>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/300?3">
      <div class="card-info">
        <h3>Project Three</h3>
        <p>Illustration</p>
      </div>
    </div>

  </div>
</section>

<!-- About -->
<section id="about" class="section fade-in">
  <h2>About Me</h2>
  <p>
    我是一名設計師，專注於UI/UX與品牌設計。喜歡創造簡潔、有質感的視覺體驗。
  </p>
</section>

<!-- Contact -->
<section id="contact" class="section fade-in">
  <h2>Contact Me</h2>
  <form action="https://formspree.io/f/mdabajrn" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" placeholder="Your Message" required></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<footer>
  <p>© 2026 Your Name</p>
</footer>

<script src="script.js"></script>
</body>
</html>
